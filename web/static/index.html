<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Tasks</title>
<style>
/* ── Apple HIG Design System ─────────────────────────────── */
:root {
  --blue:#007AFF; --green:#34C759; --orange:#FF9500;
  --red:#FF3B30;  --purple:#AF52DE; --teal:#5AC8FA;
  --bg:#F2F2F7;   --surface:#FFFFFF; --surface2:#F2F2F7;
  --sep:#C6C6C8;  --text:#000000;   --text2:#3C3C43;
  --text3:#8E8E93; --fill:#EBEBF0;
  --r:12px; --r-sm:8px; --r-lg:16px;
  --shadow:0 1px 3px rgba(0,0,0,.12),0 1px 2px rgba(0,0,0,.08);
  --shadow-md:0 4px 16px rgba(0,0,0,.12);
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;-webkit-font-smoothing:antialiased}
button{font-family:var(--font);cursor:pointer;border:none;background:none}
input,select,textarea{font-family:var(--font);font-size:15px}

/* ── Layout ────────────────────────────────────────────── */
.app{display:flex;min-height:100vh}

.sidebar{
  width:260px;min-width:260px;background:var(--surface);
  border-right:1px solid var(--sep);padding:20px 0;
  display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;
}

.sidebar-logo{display:flex;align-items:center;gap:10px;padding:4px 20px 20px;border-bottom:1px solid var(--sep);margin-bottom:12px}
.logo-mark{width:32px;height:32px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center;color:white;font-size:1rem;font-weight:700}
.logo-name{font-size:1.05rem;font-weight:700}

.sidebar-section{padding:0 12px;margin-bottom:8px}
.sidebar-label{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;padding:0 8px;margin-bottom:4px;display:block}

.nav-btn{
  display:flex;align-items:center;gap:10px;width:100%;padding:8px 10px;
  border-radius:var(--r-sm);font-size:14px;font-weight:500;color:var(--text2);
  transition:background .12s,color .12s;text-align:left;
}
.nav-btn:hover{background:var(--fill)}
.nav-btn.active{background:var(--blue);color:white}
.nav-btn.active .nav-icon{opacity:1}
.nav-icon{font-size:1rem;width:20px;text-align:center;opacity:.7}
.nav-badge{margin-left:auto;font-size:11px;font-weight:600;padding:2px 7px;border-radius:999px;background:var(--fill);color:var(--text3)}
.nav-btn.active .nav-badge{background:rgba(255,255,255,.25);color:white}

.sidebar-divider{height:1px;background:var(--sep);margin:8px 12px}

/* ── Main ───────────────────────────────────────────────── */
.main{flex:1;display:flex;flex-direction:column;min-width:0}

.topbar{
  background:var(--surface);border-bottom:1px solid var(--sep);
  padding:12px 28px;display:flex;align-items:center;gap:12px;
  position:sticky;top:0;z-index:100;
}

.view-tabs{display:flex;gap:2px;background:var(--fill);border-radius:var(--r-sm);padding:3px}
.view-tab{
  padding:5px 14px;border-radius:6px;font-size:13px;font-weight:500;
  color:var(--text3);transition:all .15s;
}
.view-tab.active{background:var(--surface);color:var(--text);box-shadow:var(--shadow)}

.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}

.icon-btn{
  width:34px;height:34px;border-radius:var(--r-sm);
  display:flex;align-items:center;justify-content:center;
  color:var(--text2);font-size:1.05rem;transition:background .12s;position:relative;
}
.icon-btn:hover{background:var(--fill)}
.notif-dot{
  position:absolute;top:6px;right:6px;width:7px;height:7px;
  background:var(--red);border-radius:50%;border:1.5px solid var(--surface);
}

.add-task-btn{
  background:var(--blue);color:white;border-radius:var(--r-sm);
  padding:7px 16px;font-size:13px;font-weight:600;
  display:flex;align-items:center;gap:6px;transition:opacity .12s;
}
.add-task-btn:hover{opacity:.88}

.content{padding:28px;flex:1;min-width:0}

/* ── Cards ──────────────────────────────────────────────── */
.card{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
.card-header{padding:16px 20px;border-bottom:1px solid var(--sep);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:15px;font-weight:600}

/* ── Stats ──────────────────────────────────────────────── */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat-card{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow);padding:18px 20px}
.stat-num{font-size:2rem;font-weight:700;line-height:1}
.stat-label{font-size:12px;color:var(--text3);margin-top:4px;font-weight:500}
.stat-card.blue .stat-num{color:var(--blue)}
.stat-card.green .stat-num{color:var(--green)}
.stat-card.orange .stat-num{color:var(--orange)}
.stat-card.red .stat-num{color:var(--red)}

/* ── Progress bar ───────────────────────────────────────── */
.progress-bar{height:8px;background:var(--fill);border-radius:999px;overflow:hidden;margin-top:12px}
.progress-fill{height:100%;background:var(--green);border-radius:999px;transition:width .4s ease}

/* ── List view ──────────────────────────────────────────── */
.task-table{width:100%;border-collapse:collapse}
.task-table th{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;padding:10px 16px;text-align:left;border-bottom:1px solid var(--sep)}
.task-row-item{transition:background .1s;cursor:pointer}
.task-row-item:hover td{background:#F8F8FF}
.task-row-item td{padding:12px 16px;border-bottom:1px solid var(--sep);vertical-align:middle}
.task-row-item.done-row td{opacity:.5}

/* ── Badges ─────────────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:600;white-space:nowrap}
.badge-high{background:#FFF0EE;color:var(--red)}
.badge-medium{background:#FFF5E6;color:var(--orange)}
.badge-low{background:#F0FFF4;color:var(--green)}
.badge-todo{background:#EFF6FF;color:var(--blue)}
.badge-in_progress{background:#FFF8E6;color:var(--orange)}
.badge-done{background:#F0FFF4;color:var(--green)}

.tag-chip{display:inline-flex;align-items:center;padding:2px 8px;border-radius:5px;font-size:11px;font-weight:500;background:var(--fill);color:var(--text2);margin:0 2px}

.assignee-avatar{
  width:26px;height:26px;border-radius:50%;
  background:var(--blue);color:white;
  font-size:10px;font-weight:700;
  display:inline-flex;align-items:center;justify-content:center;
}

.check-circle{
  width:20px;height:20px;border-radius:50%;border:2px solid var(--sep);
  display:inline-flex;align-items:center;justify-content:center;
  transition:all .15s;flex-shrink:0;font-size:10px;color:white;
}
.check-circle:hover{border-color:var(--green)}
.check-circle.checked{background:var(--green);border-color:var(--green)}

/* ── Kanban ─────────────────────────────────────────────── */
.kanban{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;align-items:start}
.kanban-col{background:var(--fill);border-radius:var(--r);padding:16px;min-height:400px}
.kanban-col-header{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.kanban-col-title{font-size:13px;font-weight:600}
.kanban-col-count{font-size:11px;font-weight:600;padding:2px 7px;border-radius:999px;background:var(--surface);color:var(--text3)}
.kanban-col.drag-over{outline:2px dashed var(--blue);outline-offset:-2px}

.kanban-card{
  background:var(--surface);border-radius:var(--r-sm);padding:14px;
  box-shadow:var(--shadow);margin-bottom:10px;cursor:pointer;
  transition:box-shadow .15s,transform .15s;
  animation:slideUp .2s ease;
}
.kanban-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.kanban-card[draggable]{cursor:grab}
.kanban-card[draggable]:active{cursor:grabbing;opacity:.7}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.kanban-card-title{font-size:13px;font-weight:600;margin-bottom:8px;line-height:1.3}
.kanban-card-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.col-todo .kanban-col-count{background:#EFF6FF;color:var(--blue)}
.col-in_progress .kanban-col-count{background:#FFF8E6;color:var(--orange)}
.col-done .kanban-col-count{background:#F0FFF4;color:var(--green)}

/* ── Calendar ───────────────────────────────────────────── */
.calendar-nav{display:flex;align-items:center;gap:16px;margin-bottom:20px}
.cal-month{font-size:1.1rem;font-weight:700}
.cal-arrow{width:32px;height:32px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;font-size:1rem;color:var(--blue);transition:background .12s}
.cal-arrow:hover{background:var(--fill)}

.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-day-name{text-align:center;font-size:11px;font-weight:600;color:var(--text3);padding:8px 0;text-transform:uppercase;letter-spacing:.04em}
.cal-day{
  min-height:80px;border-radius:var(--r-sm);padding:6px;
  background:var(--surface);cursor:pointer;transition:background .1s;position:relative;
}
.cal-day:hover{background:#F0F7FF}
.cal-day.other-month{background:var(--fill);opacity:.5}
.cal-day.today{outline:2px solid var(--blue)}
.cal-day.selected{background:#EFF6FF}
.cal-day-num{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:4px}
.cal-day.today .cal-day-num{color:var(--blue)}
.cal-dot{width:5px;height:5px;border-radius:50%;display:inline-block;margin:1px}
.cal-dot.high{background:var(--red)}
.cal-dot.medium{background:var(--orange)}
.cal-dot.low{background:var(--green)}

/* ── Detail Panel ───────────────────────────────────────── */
.panel-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:200;
  opacity:0;transition:opacity .2s;pointer-events:none;
}
.panel-overlay.open{opacity:1;pointer-events:all}

.detail-panel{
  position:fixed;top:0;right:0;bottom:0;width:420px;
  background:var(--surface);box-shadow:-4px 0 24px rgba(0,0,0,.15);
  z-index:201;transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;overflow:hidden;
}
.detail-panel.open{transform:translateX(0)}

.panel-header{padding:16px 20px;border-bottom:1px solid var(--sep);display:flex;align-items:center;gap:12px}
.panel-close{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:1.1rem;transition:background .12s}
.panel-close:hover{background:var(--fill)}
.panel-status-btn{
  margin-left:auto;padding:5px 12px;border-radius:999px;
  font-size:12px;font-weight:600;border:1px solid var(--sep);
  background:var(--surface);color:var(--text2);transition:all .12s;
}
.panel-status-btn:hover{border-color:var(--blue);color:var(--blue)}

.panel-body{padding:20px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:16px}

.panel-title-input{
  font-size:1.1rem;font-weight:700;border:none;outline:none;
  width:100%;padding:4px 0;border-bottom:2px solid transparent;
  transition:border-color .15s;background:none;
}
.panel-title-input:focus{border-bottom-color:var(--blue)}

.field-row{display:flex;align-items:center;gap:12px}
.field-label{font-size:12px;font-weight:600;color:var(--text3);width:80px;flex-shrink:0;text-transform:uppercase;letter-spacing:.04em}
.field-value{flex:1}

.panel-select{
  border:1px solid var(--sep);border-radius:var(--r-sm);padding:6px 10px;
  font-size:13px;width:100%;background:var(--surface);outline:none;
  transition:border-color .15s;
}
.panel-select:focus{border-color:var(--blue)}

.panel-input{
  border:1px solid var(--sep);border-radius:var(--r-sm);padding:6px 10px;
  font-size:13px;width:100%;outline:none;background:var(--surface);
  transition:border-color .15s;
}
.panel-input:focus{border-color:var(--blue)}

.panel-textarea{
  border:1px solid var(--sep);border-radius:var(--r-sm);padding:8px 10px;
  font-size:13px;width:100%;outline:none;background:var(--surface);
  resize:vertical;min-height:80px;line-height:1.5;transition:border-color .15s;
}
.panel-textarea:focus{border-color:var(--blue)}

.tags-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.tag-input{border:1px dashed var(--sep);border-radius:5px;padding:3px 8px;font-size:12px;outline:none;width:90px;background:none;transition:border-color .15s}
.tag-input:focus{border-color:var(--blue)}
.tag-remove{font-size:10px;margin-left:4px;cursor:pointer;color:var(--text3);opacity:.7}
.tag-remove:hover{opacity:1;color:var(--red)}

.comments-section{border-top:1px solid var(--sep);padding-top:14px}
.comments-title{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}
.comment-item{display:flex;gap:10px;margin-bottom:12px}
.comment-avatar{width:28px;height:28px;border-radius:50%;background:var(--purple);color:white;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.comment-bubble{background:var(--fill);border-radius:0 var(--r-sm) var(--r-sm) var(--r-sm);padding:8px 12px;flex:1}
.comment-author{font-size:11px;font-weight:600;margin-bottom:3px}
.comment-text{font-size:13px;line-height:1.4}
.comment-at{font-size:10px;color:var(--text3);margin-top:4px}
.comment-mention{color:var(--blue);font-weight:600}

.comment-form{display:flex;gap:8px;margin-top:8px}
.comment-input{flex:1;border:1px solid var(--sep);border-radius:var(--r-sm);padding:7px 10px;font-size:13px;outline:none;transition:border-color .15s}
.comment-input:focus{border-color:var(--blue)}
.comment-submit{background:var(--blue);color:white;border-radius:var(--r-sm);padding:7px 14px;font-size:12px;font-weight:600;transition:opacity .12s}
.comment-submit:hover{opacity:.85}

.panel-save-btn{
  background:var(--blue);color:white;border-radius:var(--r-sm);padding:10px;
  font-size:14px;font-weight:600;transition:opacity .12s;width:100%;
}
.panel-save-btn:hover{opacity:.88}
.panel-delete-btn{
  background:none;border:1px solid var(--sep);color:var(--red);border-radius:var(--r-sm);
  padding:10px;font-size:14px;font-weight:600;transition:all .12s;width:100%;
}
.panel-delete-btn:hover{background:var(--red);color:white;border-color:var(--red)}

/* ── Add task modal ─────────────────────────────────────── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .15s;
}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border-radius:var(--r-lg);padding:24px;width:480px;box-shadow:var(--shadow-md);animation:popIn .2s ease}
@keyframes popIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.modal-title{font-size:1rem;font-weight:700;margin-bottom:20px}

.form-group{margin-bottom:14px}
.form-label{font-size:12px;font-weight:600;color:var(--text3);display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
.form-input{
  border:1px solid var(--sep);border-radius:var(--r-sm);padding:9px 12px;
  font-size:14px;width:100%;outline:none;transition:border-color .15s;
}
.form-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,122,255,.12)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-actions{display:flex;gap:10px;margin-top:20px}
.btn-cancel{flex:1;padding:10px;border-radius:var(--r-sm);background:var(--fill);color:var(--text2);font-size:14px;font-weight:600;transition:background .12s}
.btn-cancel:hover{background:var(--sep)}
.btn-submit{flex:2;padding:10px;border-radius:var(--r-sm);background:var(--blue);color:white;font-size:14px;font-weight:600;transition:opacity .12s}
.btn-submit:hover{opacity:.88}

.notif-toast{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.85);color:white;padding:10px 20px;border-radius:999px;
  font-size:13px;font-weight:500;z-index:400;opacity:0;transition:opacity .2s;pointer-events:none;
}
.notif-toast.show{opacity:1}

.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-icon{font-size:2.5rem;margin-bottom:10px}

/* ── Notification panel ─────────────────────────────────── */
.notif-panel{
  position:absolute;top:44px;right:0;width:300px;
  background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow-md);
  border:1px solid var(--sep);z-index:200;overflow:hidden;
  display:none;
}
.notif-panel.open{display:block;animation:fadeDown .15s ease}
@keyframes fadeDown{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.notif-panel-header{padding:14px 16px;border-bottom:1px solid var(--sep);font-size:13px;font-weight:600}
.notif-item{padding:12px 16px;border-bottom:1px solid var(--sep);font-size:13px;line-height:1.4}
.notif-item:last-child{border-bottom:none}
.notif-item-title{font-weight:600;margin-bottom:2px}
.notif-item-sub{color:var(--text3);font-size:12px}
.notif-toggle-row{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;font-size:13px;border-top:1px solid var(--sep)}
.toggle-switch{
  width:36px;height:20px;background:var(--sep);border-radius:10px;
  position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;
}
.toggle-switch.on{background:var(--green)}
.toggle-knob{
  position:absolute;top:2px;left:2px;width:16px;height:16px;
  background:white;border-radius:50%;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);
}
.toggle-switch.on .toggle-knob{transform:translateX(16px)}
</style>
</head>
<body>
<div class="app">

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-mark">T</div>
    <span class="logo-name">Tasks</span>
  </div>

  <div class="sidebar-section">
    <span class="sidebar-label">Views</span>
    <button class="nav-btn" onclick="setView('dashboard')">
      <span class="nav-icon">📊</span> Dashboard
    </button>
    <button class="nav-btn" onclick="setView('list')">
      <span class="nav-icon">☰</span> List
      <span class="nav-badge" id="sb-all">0</span>
    </button>
    <button class="nav-btn" onclick="setView('kanban')">
      <span class="nav-icon">⬛</span> Board
    </button>
    <button class="nav-btn" onclick="setView('calendar')">
      <span class="nav-icon">📅</span> Calendar
    </button>
  </div>

  <div class="sidebar-divider"></div>

  <div class="sidebar-section">
    <span class="sidebar-label">Filter</span>
    <button class="nav-btn" onclick="setStatusFilter('')">
      <span class="nav-icon">◉</span> All tasks
      <span class="nav-badge" id="sb-total">0</span>
    </button>
    <button class="nav-btn" onclick="setStatusFilter('todo')">
      <span class="nav-icon" style="color:var(--blue)">○</span> To Do
      <span class="nav-badge" id="sb-todo">0</span>
    </button>
    <button class="nav-btn" onclick="setStatusFilter('in_progress')">
      <span class="nav-icon" style="color:var(--orange)">◑</span> In Progress
      <span class="nav-badge" id="sb-inprogress">0</span>
    </button>
    <button class="nav-btn" onclick="setStatusFilter('done')">
      <span class="nav-icon" style="color:var(--green)">●</span> Done
      <span class="nav-badge" id="sb-done">0</span>
    </button>
  </div>

  <div class="sidebar-divider"></div>

  <div class="sidebar-section">
    <span class="sidebar-label">Priority</span>
    <button class="nav-btn" onclick="setPriorityFilter('high')">
      <span class="nav-icon">🔴</span> High
      <span class="nav-badge" id="sb-high">0</span>
    </button>
    <button class="nav-btn" onclick="setPriorityFilter('medium')">
      <span class="nav-icon">🟡</span> Medium
      <span class="nav-badge" id="sb-medium">0</span>
    </button>
    <button class="nav-btn" onclick="setPriorityFilter('low')">
      <span class="nav-icon">🟢</span> Low
      <span class="nav-badge" id="sb-low">0</span>
    </button>
  </div>
</aside>

<!-- Main -->
<div class="main">

  <!-- Top bar -->
  <div class="topbar">
    <div class="view-tabs" id="view-tabs">
      <button class="view-tab active" onclick="setView('dashboard')">Dashboard</button>
      <button class="view-tab" onclick="setView('list')">List</button>
      <button class="view-tab" onclick="setView('kanban')">Board</button>
      <button class="view-tab" onclick="setView('calendar')">Calendar</button>
    </div>

    <!-- Search -->
    <input id="search-input" placeholder="🔍  Search tasks…" style="border:1px solid var(--sep);border-radius:var(--r-sm);padding:6px 12px;font-size:13px;outline:none;width:200px;margin-left:16px;transition:border-color .15s" onfocus="this.style.borderColor='var(--blue)'" onblur="this.style.borderColor='var(--sep)'"/>

    <div class="topbar-right">
      <!-- Notification bell -->
      <div style="position:relative">
        <button class="icon-btn" id="notif-btn" onclick="toggleNotifPanel()">
          🔔 <span class="notif-dot" id="notif-dot" style="display:none"></span>
        </button>
        <div class="notif-panel" id="notif-panel">
          <div class="notif-panel-header">Notifications</div>
          <div id="notif-list"><div style="padding:16px;color:var(--text3);font-size:13px">No notifications</div></div>
          <div class="notif-toggle-row">
            <span>Enable notifications</span>
            <div class="toggle-switch" id="notif-toggle" onclick="toggleNotifications()">
              <div class="toggle-knob"></div>
            </div>
          </div>
        </div>
      </div>

      <button class="icon-btn" title="Export to CSV" onclick="exportCSV()" style="font-size:.85rem;font-weight:600;color:var(--text2);padding:0 10px;width:auto">⬇ CSV</button>
      <button class="add-task-btn" onclick="openAddModal()">＋ New Task</button>
    </div>
  </div>

  <!-- Content -->
  <div class="content" id="content"></div>
</div><!-- /main -->

</div><!-- /app -->

<!-- Add Task Modal -->
<div class="modal-overlay" id="add-modal" onclick="e => e.target===this && closeAddModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">New Task</div>

    <div class="form-group">
      <label class="form-label">Title *</label>
      <input class="form-input" id="m-title" placeholder="What needs to be done?" autocomplete="off"/>
    </div>

    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea class="form-input" id="m-desc" rows="2" placeholder="Add details…" style="resize:vertical"></textarea>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Assignee</label>
        <input class="form-input" id="m-assignee" placeholder="Name…"/>
      </div>
      <div class="form-group">
        <label class="form-label">Due Date</label>
        <input class="form-input" id="m-due" type="date"/>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Priority</label>
        <select class="form-input" id="m-priority">
          <option value="low">🟢 Low</option>
          <option value="medium" selected>🟡 Medium</option>
          <option value="high">🔴 High</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Status</label>
        <select class="form-input" id="m-status">
          <option value="todo">To Do</option>
          <option value="in_progress">In Progress</option>
          <option value="done">Done</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Tags <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--text3)">(comma separated)</span></label>
      <input class="form-input" id="m-tags" placeholder="design, backend, urgent…"/>
    </div>

    <div id="m-error" style="color:var(--red);font-size:12px;margin-top:-8px;margin-bottom:8px;display:none"></div>

    <div class="form-actions">
      <button class="btn-cancel" onclick="closeAddModal()">Cancel</button>
      <button class="btn-submit" onclick="submitNewTask()">Create Task</button>
    </div>
  </div>
</div>

<!-- Detail Panel -->
<div class="panel-overlay" id="panel-overlay" onclick="closePanel()"></div>
<div class="detail-panel" id="detail-panel">
  <div class="panel-header">
    <button class="panel-close" onclick="closePanel()">✕</button>
    <span style="font-size:13px;font-weight:600;color:var(--text3)" id="panel-id-label">#1</span>
    <button class="panel-status-btn" id="panel-status-btn" onclick="cycleStatus()">To Do</button>
  </div>
  <div class="panel-body" id="panel-body"></div>
</div>

<!-- Toast -->
<div class="notif-toast" id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
const S = {
  view: 'dashboard',
  all: [],
  filter: { status: '', priority: '' },
  search: '',
  selectedId: null,
  notifEnabled: localStorage.getItem('notif') === '1',
  calDate: new Date(),
  draggingId: null,
};

// ── API ────────────────────────────────────────────────────────────────────
const api = {
  list: (p={}) => fetch('/tasks?'+new URLSearchParams(Object.fromEntries(Object.entries(p).filter(([,v])=>v)))).then(r=>r.json()),
  get:  (id) => fetch(`/tasks/${id}`).then(r=>r.json()),
  create:(b) => fetch('/tasks',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)}).then(r=>{if(!r.ok)return r.json().then(e=>{throw e});return r.json()}),
  patch: (id,b) => fetch(`/tasks/${id}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)}).then(r=>r.json()),
  del:   (id) => fetch(`/tasks/${id}`,{method:'DELETE'}),
  comment:(id,b)=>fetch(`/tasks/${id}/comments`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)}).then(r=>r.json()),
};

// ── Helpers ────────────────────────────────────────────────────────────────
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function initials(name){return (name||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)}
function colorFor(name){const h=['#007AFF','#AF52DE','#FF9500','#FF3B30','#5AC8FA','#34C759'];return h[name.charCodeAt(0)%h.length]}
function fmtDate(d){if(!d)return'';const[y,m,day]=d.split('-');return `${m}/${day}/${y}`}
function toast(msg,dur=2500){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),dur)}

function highlightMentions(text){return esc(text).replace(/@(\w+)/g,'<span class="comment-mention">@$1</span>')}

function statusLabel(s){return {todo:'To Do',in_progress:'In Progress',done:'Done'}[s]||s}
function statusBadge(s){return `<span class="badge badge-${s}">${statusLabel(s)}</span>`}
function priorityBadge(p){return `<span class="badge badge-${p}">${p.charAt(0).toUpperCase()+p.slice(1)}</span>`}

function assigneeAvatar(name){
  if(!name) return '';
  return `<div class="assignee-avatar" style="background:${colorFor(name)}" title="${esc(name)}">${initials(name)}</div>`;
}

// ── Refresh & sidebar counts ───────────────────────────────────────────────
async function refresh(skipRender=false){
  S.all = await api.list();
  updateSidebar();
  if(!skipRender) render();
}

function updateSidebar(){
  const a=S.all;
  document.getElementById('sb-all').textContent = a.length;
  document.getElementById('sb-total').textContent = a.length;
  document.getElementById('sb-todo').textContent = a.filter(t=>t.status==='todo').length;
  document.getElementById('sb-inprogress').textContent = a.filter(t=>t.status==='in_progress').length;
  document.getElementById('sb-done').textContent = a.filter(t=>t.status==='done').length;
  document.getElementById('sb-high').textContent = a.filter(t=>t.priority==='high').length;
  document.getElementById('sb-medium').textContent = a.filter(t=>t.priority==='medium').length;
  document.getElementById('sb-low').textContent = a.filter(t=>t.priority==='low').length;
}

function filtered(){
  let t=[...S.all];
  if(S.filter.status)   t=t.filter(x=>x.status===S.filter.status);
  if(S.filter.priority) t=t.filter(x=>x.priority===S.filter.priority);
  if(S.search){const k=S.search.toLowerCase();t=t.filter(x=>x.title.toLowerCase().includes(k)||x.description.toLowerCase().includes(k)||(x.tags||[]).some(g=>g.toLowerCase().includes(k)))}
  return t;
}

// ── View routing ───────────────────────────────────────────────────────────
function render(){
  const views={dashboard:renderDashboard,list:renderList,kanban:renderKanban,calendar:renderCalendar};
  (views[S.view]||renderDashboard)();
}

function setView(v){
  S.view=v;
  document.querySelectorAll('.view-tab').forEach((b,i)=>{
    b.classList.toggle('active',['dashboard','list','kanban','calendar'][i]===v);
  });
  document.querySelectorAll('.sidebar .nav-btn').forEach((b,i)=>{
    b.classList.toggle('active',i===['dashboard','list','kanban','calendar'].indexOf(v));
  });
  render();
}

function setStatusFilter(s){
  S.filter.status=s;S.filter.priority='';
  setView('list');
}

function setPriorityFilter(p){
  S.filter.priority=S.filter.priority===p?'':p;
  S.filter.status='';
  setView('list');
}

// ── Dashboard ──────────────────────────────────────────────────────────────
function renderDashboard(){
  const a=S.all,done=a.filter(t=>t.status==='done').length;
  const pct=a.length?Math.round(done/a.length*100):0;
  const byPriority=['high','medium','low'].map(p=>{
    const n=a.filter(t=>t.priority===p).length;
    const pct2=a.length?Math.round(n/a.length*100):0;
    const colors={high:'var(--red)',medium:'var(--orange)',low:'var(--green)'};
    return `<div style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px">
        <span style="font-weight:500;text-transform:capitalize">${p} priority</span>
        <span style="color:var(--text3)">${n} tasks</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct2}%;background:${colors[p]}"></div></div>
    </div>`;
  }).join('');

  const recent=a.slice().sort((a,b)=>b.updated_at.localeCompare(a.updated_at)).slice(0,5);
  const recentHtml=recent.length?recent.map(t=>`
    <div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--sep);cursor:pointer" onclick="openPanel(${t.id})">
      ${assigneeAvatar(t.assignee)||`<div style="width:26px;height:26px;border-radius:50%;background:var(--fill);flex-shrink:0"></div>`}
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(t.title)}</div>
        <div style="font-size:11px;color:var(--text3)">${t.due_date?'Due '+fmtDate(t.due_date):''}</div>
      </div>
      ${statusBadge(t.status)}
    </div>`).join('')
  :`<div style="color:var(--text3);font-size:13px;padding:20px 0;text-align:center">No tasks yet</div>`;

  document.getElementById('content').innerHTML=`
    <div class="stats-grid">
      <div class="stat-card blue"><div class="stat-num">${a.length}</div><div class="stat-label">Total Tasks</div></div>
      <div class="stat-card orange"><div class="stat-num">${a.filter(t=>t.status==='in_progress').length}</div><div class="stat-label">In Progress</div></div>
      <div class="stat-card green"><div class="stat-num">${done}</div><div class="stat-label">Completed</div></div>
      <div class="stat-card red"><div class="stat-num">${a.filter(t=>t.priority==='high'&&t.status!=='done').length}</div><div class="stat-label">High Priority Open</div></div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
      <div class="card">
        <div class="card-header"><span class="card-title">Completion</span><span style="font-size:1.2rem;font-weight:700;color:var(--green)">${pct}%</span></div>
        <div style="padding:20px">
          <div class="progress-bar" style="height:12px"><div class="progress-fill" style="width:${pct}%"></div></div>
          <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text3);margin-top:8px">
            <span>${done} done</span><span>${a.length-done} remaining</span>
          </div>
          <div style="margin-top:20px">${byPriority}</div>
        </div>
      </div>

      <div class="card">
        <div class="card-header"><span class="card-title">Recent Activity</span></div>
        <div style="padding:0 20px 8px">${recentHtml}</div>
      </div>
    </div>`;
}

// ── List view ──────────────────────────────────────────────────────────────
function renderList(){
  const tasks=filtered();
  const rows=tasks.length?tasks.map(t=>`
    <tr class="task-row-item ${t.status==='done'?'done-row':''}" onclick="openPanel(${t.id})">
      <td><div class="check-circle ${t.status==='done'?'checked':''}" onclick="event.stopPropagation();quickDone(${t.id},event)">${t.status==='done'?'✓':''}</div></td>
      <td>
        <div style="font-size:14px;font-weight:500">${esc(t.title)}</div>
        ${t.description?`<div style="font-size:12px;color:var(--text3);margin-top:2px">${esc(t.description.slice(0,60))}${t.description.length>60?'…':''}</div>`:''}
        ${(t.tags||[]).length?`<div style="margin-top:4px">${t.tags.map(g=>`<span class="tag-chip">${esc(g)}</span>`).join('')}</div>`:''}
      </td>
      <td>${assigneeAvatar(t.assignee)}<span style="font-size:12px;color:var(--text3);margin-left:6px">${esc(t.assignee||'—')}</span></td>
      <td>${priorityBadge(t.priority)}</td>
      <td>${statusBadge(t.status)}</td>
      <td style="font-size:12px;color:var(--text3)">${t.due_date?fmtDate(t.due_date):'—'}</td>
      <td><button onclick="event.stopPropagation();delTask(${t.id})" style="color:var(--text3);font-size:12px;padding:4px 8px;border-radius:6px;transition:all .1s" onmouseover="this.style.color='var(--red)';this.style.background='#FFF0EE'" onmouseout="this.style.color='var(--text3)';this.style.background='none'">Delete</button></td>
    </tr>`).join('')
  :`<tr><td colspan="7"><div class="empty-state"><div class="empty-icon">📋</div><div>No tasks found</div></div></td></tr>`;

  document.getElementById('content').innerHTML=`
    <div class="card">
      <table class="task-table">
        <thead><tr>
          <th></th><th>Task</th><th>Assignee</th><th>Priority</th><th>Status</th><th>Due</th><th></th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

// ── Kanban ─────────────────────────────────────────────────────────────────
function renderKanban(){
  const all=filtered();
  const cols=[
    {key:'todo',label:'To Do',icon:'○'},
    {key:'in_progress',label:'In Progress',icon:'◑'},
    {key:'done',label:'Done',icon:'●'},
  ];

  const colHtml=cols.map(col=>{
    const tasks=all.filter(t=>t.status===col.key);
    const cards=tasks.length?tasks.map(t=>`
      <div class="kanban-card" draggable="true"
           ondragstart="dragStart(event,${t.id})"
           onclick="openPanel(${t.id})">
        <div class="kanban-card-title">${esc(t.title)}</div>
        <div class="kanban-card-meta">
          ${priorityBadge(t.priority)}
          ${t.due_date?`<span style="font-size:11px;color:var(--text3)">📅 ${fmtDate(t.due_date)}</span>`:''}
          ${t.assignee?assigneeAvatar(t.assignee):''}
          ${(t.comments||[]).length?`<span style="font-size:11px;color:var(--text3);margin-left:auto">💬 ${t.comments.length}</span>`:''}
        </div>
      </div>`).join('')
    :`<div style="text-align:center;padding:24px 0;color:var(--text3);font-size:12px">No tasks</div>`;

    return `
      <div class="kanban-col col-${col.key}"
           ondragover="event.preventDefault();this.classList.add('drag-over')"
           ondragleave="this.classList.remove('drag-over')"
           ondrop="dragDrop(event,'${col.key}',this)">
        <div class="kanban-col-header">
          <span style="font-size:1rem;color:${col.key==='todo'?'var(--blue)':col.key==='in_progress'?'var(--orange)':'var(--green)'}">${col.icon}</span>
          <span class="kanban-col-title">${col.label}</span>
          <span class="kanban-col-count">${tasks.length}</span>
        </div>
        ${cards}
      </div>`;
  }).join('');

  document.getElementById('content').innerHTML=`<div class="kanban">${colHtml}</div>`;
}

function dragStart(e,id){S.draggingId=id;e.dataTransfer.effectAllowed='move'}
async function dragDrop(e,newStatus,col){
  e.preventDefault();col.classList.remove('drag-over');
  if(!S.draggingId)return;
  await api.patch(S.draggingId,{status:newStatus});
  S.draggingId=null;
  await refresh();
}

// ── Calendar ───────────────────────────────────────────────────────────────
function renderCalendar(){
  const d=S.calDate;
  const y=d.getFullYear(),m=d.getMonth();
  const monthName=d.toLocaleString('default',{month:'long',year:'numeric'});
  const first=new Date(y,m,1).getDay();
  const days=new Date(y,m+1,0).getDate();
  const todayStr=new Date().toISOString().split('T')[0];

  const tasksByDate={};
  S.all.forEach(t=>{if(t.due_date)(tasksByDate[t.due_date]=tasksByDate[t.due_date]||[]).push(t)});

  const dayNames=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(n=>`<div class="cal-day-name">${n}</div>`).join('');

  let cells='';
  for(let i=0;i<first;i++) cells+=`<div class="cal-day other-month"></div>`;
  for(let day=1;day<=days;day++){
    const dateStr=`${y}-${String(m+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const dayTasks=tasksByDate[dateStr]||[];
    const isToday=dateStr===todayStr;
    const dots=dayTasks.map(t=>`<span class="cal-dot ${t.priority}"></span>`).join('');
    cells+=`
      <div class="cal-day${isToday?' today':''}" onclick="openCalDay('${dateStr}')">
        <div class="cal-day-num">${day}</div>
        <div>${dots}</div>
        ${dayTasks.length>3?`<div style="font-size:10px;color:var(--text3)">+${dayTasks.length-3}</div>`:''}
      </div>`;
  }

  document.getElementById('content').innerHTML=`
    <div class="card" style="padding:24px">
      <div class="calendar-nav">
        <button class="cal-arrow" onclick="changeMonth(-1)">‹</button>
        <span class="cal-month">${monthName}</span>
        <button class="cal-arrow" onclick="changeMonth(1)">›</button>
        <button onclick="S.calDate=new Date();renderCalendar()" style="margin-left:auto;font-size:13px;font-weight:600;color:var(--blue);padding:5px 12px;border-radius:var(--r-sm);transition:background .12s" onmouseover="this.style.background='var(--fill)'" onmouseout="this.style.background='none'">Today</button>
      </div>
      <div class="cal-grid">${dayNames}${cells}</div>
    </div>
    <div id="cal-day-tasks" style="margin-top:20px"></div>`;
}

function changeMonth(dir){S.calDate=new Date(S.calDate.getFullYear(),S.calDate.getMonth()+dir,1);renderCalendar()}

function openCalDay(dateStr){
  const tasks=S.all.filter(t=>t.due_date===dateStr);
  if(!tasks.length)return;
  const el=document.getElementById('cal-day-tasks');
  el.innerHTML=`
    <div class="card">
      <div class="card-header"><span class="card-title">Tasks due ${fmtDate(dateStr)}</span></div>
      <div style="padding:0 20px">
        ${tasks.map(t=>`
          <div style="display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--sep);cursor:pointer" onclick="openPanel(${t.id})">
            <div style="flex:1;font-size:14px;font-weight:500">${esc(t.title)}</div>
            ${priorityBadge(t.priority)}${statusBadge(t.status)}
          </div>`).join('')}
      </div>
    </div>`;
}

// ── Task Detail Panel ──────────────────────────────────────────────────────
async function openPanel(id){
  S.selectedId=id;
  const t=await api.get(id);
  document.getElementById('panel-overlay').classList.add('open');
  document.getElementById('detail-panel').classList.add('open');
  document.getElementById('panel-id-label').textContent=`#${t.id}`;
  updatePanelStatusBtn(t.status);
  renderPanelBody(t);
}

function closePanel(){
  document.getElementById('panel-overlay').classList.remove('open');
  document.getElementById('detail-panel').classList.remove('open');
  S.selectedId=null;
}

function updatePanelStatusBtn(status){
  const btn=document.getElementById('panel-status-btn');
  btn.textContent=statusLabel(status);
  btn.style.color=status==='done'?'var(--green)':status==='in_progress'?'var(--orange)':'var(--blue)';
}

async function cycleStatus(){
  if(!S.selectedId)return;
  const t=await api.get(S.selectedId);
  const cycle={todo:'in_progress',in_progress:'done',done:'todo'};
  const next=cycle[t.status]||'todo';
  await api.patch(S.selectedId,{status:next});
  updatePanelStatusBtn(next);
  await refresh(true);
  toast(`Status → ${statusLabel(next)}`);
}

function renderPanelBody(t){
  const tagsHtml=(t.tags||[]).map((tag,i)=>`
    <span class="tag-chip">${esc(tag)}<span class="tag-remove" onclick="removeTag(${i})">✕</span></span>`).join('');

  const commentsHtml=(t.comments||[]).map(c=>`
    <div class="comment-item">
      <div class="comment-avatar" style="background:${colorFor(c.author)}">${initials(c.author)}</div>
      <div class="comment-bubble">
        <div class="comment-author">${esc(c.author)}</div>
        <div class="comment-text">${highlightMentions(c.text)}</div>
        <div class="comment-at">${c.at?.slice(0,10)||''}</div>
      </div>
    </div>`).join('');

  document.getElementById('panel-body').innerHTML=`
    <input class="panel-title-input" id="p-title" value="${esc(t.title)}"/>

    <div class="field-row"><span class="field-label">Priority</span>
      <select class="panel-select" id="p-priority">
        <option value="low" ${t.priority==='low'?'selected':''}>🟢 Low</option>
        <option value="medium" ${t.priority==='medium'?'selected':''}>🟡 Medium</option>
        <option value="high" ${t.priority==='high'?'selected':''}>🔴 High</option>
      </select>
    </div>

    <div class="field-row"><span class="field-label">Assignee</span>
      <input class="panel-input" id="p-assignee" value="${esc(t.assignee||'')}" placeholder="Assign to…"/>
    </div>

    <div class="field-row"><span class="field-label">Due Date</span>
      <input class="panel-input" id="p-due" type="date" value="${t.due_date||''}"/>
    </div>

    <div>
      <div class="field-label" style="margin-bottom:8px">Tags</div>
      <div class="tags-row" id="p-tags-row">
        ${tagsHtml}
        <input class="tag-input" id="p-tag-input" placeholder="+ tag" onkeydown="addTagOnEnter(event)"/>
      </div>
    </div>

    <div>
      <div class="field-label" style="margin-bottom:8px">Description</div>
      <textarea class="panel-textarea" id="p-desc">${esc(t.description||'')}</textarea>
    </div>

    <button class="panel-save-btn" onclick="savePanel()">Save Changes</button>
    <button class="panel-delete-btn" onclick="delTask(${t.id},true)">Delete Task</button>

    <div class="comments-section">
      <div class="comments-title">Comments (${(t.comments||[]).length})</div>
      <div id="comments-list">${commentsHtml||'<div style="color:var(--text3);font-size:13px;padding:8px 0">No comments yet.</div>'}</div>
      <div class="comment-form">
        <input class="comment-input" id="c-input" placeholder="Write a comment… use @name to mention" onkeydown="if(event.key==='Enter')submitComment()"/>
        <button class="comment-submit" onclick="submitComment()">Send</button>
      </div>
    </div>`;

  // Store current tags in dataset
  document.getElementById('panel-body').dataset.tags = JSON.stringify(t.tags||[]);
}

function addTagOnEnter(e){
  if(e.key!=='Enter'&&e.key!==',')return;
  e.preventDefault();
  const input=document.getElementById('p-tag-input');
  const val=input.value.trim().replace(/,$/,'');
  if(!val)return;
  const body=document.getElementById('panel-body');
  const tags=JSON.parse(body.dataset.tags||'[]');
  if(!tags.includes(val)){
    tags.push(val);
    body.dataset.tags=JSON.stringify(tags);
    const chip=document.createElement('span');
    chip.className='tag-chip';
    chip.innerHTML=`${esc(val)}<span class="tag-remove" onclick="this.parentElement.remove()">✕</span>`;
    document.getElementById('p-tags-row').insertBefore(chip,input);
  }
  input.value='';
}

function removeTag(idx){
  const body=document.getElementById('panel-body');
  const tags=JSON.parse(body.dataset.tags||'[]');
  tags.splice(idx,1);
  body.dataset.tags=JSON.stringify(tags);
  if(S.selectedId) api.get(S.selectedId).then(t=>{t.tags=tags;renderPanelBody({...t,tags})});
}

async function savePanel(){
  if(!S.selectedId)return;
  const tags=Array.from(document.querySelectorAll('#p-tags-row .tag-chip')).map(el=>el.textContent.replace('✕','').trim()).filter(Boolean);
  await api.patch(S.selectedId,{
    title:document.getElementById('p-title').value.trim(),
    description:document.getElementById('p-desc').value,
    assignee:document.getElementById('p-assignee').value.trim(),
    due_date:document.getElementById('p-due').value||null,
    priority:document.getElementById('p-priority').value,
    tags,
  });
  await refresh(true);
  toast('Saved ✓');
}

async function submitComment(){
  if(!S.selectedId)return;
  const input=document.getElementById('c-input');
  const text=input.value.trim();
  if(!text)return;
  const comment=await api.comment(S.selectedId,{text,author:'Me'});
  input.value='';
  const list=document.getElementById('comments-list');
  const div=document.createElement('div');
  div.className='comment-item';
  div.innerHTML=`
    <div class="comment-avatar" style="background:${colorFor('Me')}">${initials('Me')}</div>
    <div class="comment-bubble">
      <div class="comment-author">Me</div>
      <div class="comment-text">${highlightMentions(comment.text)}</div>
      <div class="comment-at">${comment.at?.slice(0,10)||''}</div>
    </div>`;
  list.appendChild(div);
  await refresh(true);
}

// ── Add modal ──────────────────────────────────────────────────────────────
function openAddModal(){
  document.getElementById('add-modal').classList.add('open');
  document.getElementById('m-title').focus();
}

function closeAddModal(){
  document.getElementById('add-modal').classList.remove('open');
  ['m-title','m-desc','m-assignee','m-tags'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('m-due').value='';
  document.getElementById('m-priority').value='medium';
  document.getElementById('m-status').value='todo';
  document.getElementById('m-error').style.display='none';
}

async function submitNewTask(){
  const title=document.getElementById('m-title').value.trim();
  const errEl=document.getElementById('m-error');
  if(!title){errEl.textContent='Title is required.';errEl.style.display='block';return}
  errEl.style.display='none';
  const tags=document.getElementById('m-tags').value.split(',').map(t=>t.trim()).filter(Boolean);
  try{
    const task=await api.create({
      title,
      description:document.getElementById('m-desc').value,
      assignee:document.getElementById('m-assignee').value.trim(),
      due_date:document.getElementById('m-due').value||null,
      priority:document.getElementById('m-priority').value,
      tags,
    });
    // set status separately since create defaults to todo
    const status=document.getElementById('m-status').value;
    if(status!=='todo') await api.patch(task.id,{status});
    closeAddModal();
    await refresh();
    toast(`Task created ✓`);
    scheduleNotification(task);
  }catch(e){errEl.textContent=e.detail||'Error creating task.';errEl.style.display='block'}
}

// ── Delete ─────────────────────────────────────────────────────────────────
async function delTask(id,fromPanel=false){
  if(!confirm('Delete this task?'))return;
  await api.del(id);
  if(fromPanel)closePanel();
  await refresh();
  toast('Task deleted');
}

// ── Quick done (list view checkbox) ───────────────────────────────────────
async function quickDone(id,e){
  const t=S.all.find(x=>x.id===id);
  if(!t)return;
  const next=t.status==='done'?'todo':'done';
  await api.patch(id,{status:next});
  await refresh();
}

// ── Notifications ──────────────────────────────────────────────────────────
function toggleNotifPanel(){
  const p=document.getElementById('notif-panel');
  p.classList.toggle('open');
  if(p.classList.contains('open'))renderNotifList();
}

function renderNotifList(){
  const today=new Date().toISOString().split('T')[0];
  const tomorrow=new Date(Date.now()+86400000).toISOString().split('T')[0];
  const due=S.all.filter(t=>t.status!=='done'&&(t.due_date===today||t.due_date===tomorrow));
  const list=document.getElementById('notif-list');
  if(!due.length){list.innerHTML='<div style="padding:16px;color:var(--text3);font-size:13px">No upcoming due tasks</div>';return}
  list.innerHTML=due.map(t=>`
    <div class="notif-item">
      <div class="notif-item-title">${esc(t.title)}</div>
      <div class="notif-item-sub">${t.due_date===today?'⚠️ Due today':'📅 Due tomorrow'} · ${t.priority} priority</div>
    </div>`).join('');
  document.getElementById('notif-dot').style.display='block';
}

async function toggleNotifications(){
  const toggle=document.getElementById('notif-toggle');
  if(!S.notifEnabled){
    const perm=await Notification.requestPermission();
    if(perm!=='granted'){toast('Notification permission denied');return}
    S.notifEnabled=true;localStorage.setItem('notif','1');
    toggle.classList.add('on');
    checkDueTasks();
    toast('Notifications enabled ✓');
  }else{
    S.notifEnabled=false;localStorage.removeItem('notif');
    toggle.classList.remove('on');
    toast('Notifications disabled');
  }
}

function checkDueTasks(){
  if(!S.notifEnabled||Notification.permission!=='granted')return;
  const today=new Date().toISOString().split('T')[0];
  const tomorrow=new Date(Date.now()+86400000).toISOString().split('T')[0];
  S.all.forEach(t=>{
    if(t.status==='done')return;
    if(t.due_date===today)
      new Notification('Task due today',{body:t.title,icon:'https://img.icons8.com/fluency/48/checkmark.png'});
    else if(t.due_date===tomorrow)
      new Notification('Task due tomorrow',{body:t.title,icon:'https://img.icons8.com/fluency/48/checkmark.png'});
  });
}

function scheduleNotification(task){
  if(!S.notifEnabled||!task.due_date||Notification.permission!=='granted')return;
  const due=new Date(task.due_date+'T09:00:00');
  const ms=due-Date.now();
  if(ms>0&&ms<7*24*60*60*1000)
    setTimeout(()=>new Notification('Task due today',{body:task.title}),ms);
}

// ── Close panels on outside click ─────────────────────────────────────────
document.addEventListener('click',e=>{
  const panel=document.getElementById('notif-panel');
  const btn=document.getElementById('notif-btn');
  if(panel.classList.contains('open')&&!panel.contains(e.target)&&!btn.contains(e.target))
    panel.classList.remove('open');
});

document.getElementById('add-modal').addEventListener('click',function(e){
  if(e.target===this)closeAddModal();
});

document.getElementById('m-title').addEventListener('keydown',e=>{if(e.key==='Enter')submitNewTask()});

// ── Search ─────────────────────────────────────────────────────────────────
let searchTimer;
document.getElementById('search-input').addEventListener('input',e=>{
  clearTimeout(searchTimer);
  searchTimer=setTimeout(()=>{S.search=e.target.value.trim();if(S.search)setView('list');else render();},200);
});

// ── CSV Export ─────────────────────────────────────────────────────────────

const CSV_HEADERS = ['id','title','description','priority','status','due_date','assignee','created_at'];

function buildCsvRow(task){
  const cell = v => {
    const s = (v == null || v === '') ? '' : String(v);
    return /[,"\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
  };
  return [task.id, task.title, task.description, task.priority,
          task.status, task.due_date||'', task.assignee||'', task.created_at]
    .map(cell).join(',');
}

function exportCSV(){
  const rows = [CSV_HEADERS.join(',')];
  S.all.forEach(task => rows.push(buildCsvRow(task)));
  const blob = new Blob([rows.join('\n')], {type:'text/csv'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = 'tasks.csv';
  a.click();
  URL.revokeObjectURL(url);
}

// ── Init ───────────────────────────────────────────────────────────────────
(async()=>{
  if(S.notifEnabled){
    document.getElementById('notif-toggle').classList.add('on');
  }
  await refresh();
  setView('dashboard');
  setTimeout(checkDueTasks,1000);
})();
</script>
