<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tasks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a24;
      --surface2: #22222f;
      --border: rgba(255,255,255,0.07);
      --text: #f0f0f5;
      --muted: #6b6b80;
      --accent: #7c6fef;
      --accent-glow: rgba(124,111,239,0.25);
      --green: #34d399;
      --red: #f87171;
      --yellow: #fbbf24;
      --radius: 14px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Sidebar layout ─────────────────────── */
    .layout { display: flex; min-height: 100vh; }

    aside {
      width: 240px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 28px 20px;
      display: flex;
      flex-direction: column;
      gap: 32px;
      position: fixed;
      top: 0; left: 0; bottom: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 34px; height: 34px;
      background: var(--accent);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
      box-shadow: 0 0 16px var(--accent-glow);
    }

    .logo-text { font-weight: 700; font-size: 1.05rem; }

    nav { display: flex; flex-direction: column; gap: 4px; }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: 9px;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      color: var(--muted);
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      transition: all .15s;
    }

    .nav-item:hover { color: var(--text); background: var(--surface2); }

    .nav-item.active {
      color: var(--text);
      background: var(--surface2);
    }

    .nav-item.active .nav-dot { background: var(--accent); }

    .nav-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }

    .nav-count {
      margin-left: auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 0.72rem;
      padding: 1px 7px;
      color: var(--muted);
    }

    .sidebar-footer {
      margin-top: auto;
      font-size: 0.75rem;
      color: var(--muted);
      line-height: 1.6;
    }

    /* ── Main content ───────────────────────── */
    .content {
      margin-left: 240px;
      flex: 1;
      padding: 40px 48px;
      max-width: 860px;
    }

    .page-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    .page-title { font-size: 1.75rem; font-weight: 700; }
    .page-sub { font-size: 0.85rem; color: var(--muted); margin-top: 4px; }

    /* ── Add task bar ───────────────────────── */
    .add-bar {
      display: flex;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      margin-bottom: 28px;
      align-items: center;
      transition: border-color .2s;
    }

    .add-bar:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }

    .add-bar input[name="title"] {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      font-size: 0.95rem;
      color: var(--text);
      font-family: 'Inter', sans-serif;
    }

    .add-bar input[name="title"]::placeholder { color: var(--muted); }

    .divider { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }

    .add-bar input[name="due"],
    .add-bar select[name="priority"] {
      background: none;
      border: none;
      outline: none;
      font-size: 0.82rem;
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      cursor: pointer;
    }

    .add-bar select[name="priority"] option { background: #1a1a24; }

    .add-bar input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.5); cursor: pointer; }

    .btn-add {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 7px 16px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: opacity .15s, box-shadow .15s;
      white-space: nowrap;
    }

    .btn-add:hover { opacity: .88; box-shadow: 0 0 12px var(--accent-glow); }

    .error-msg { color: var(--red); font-size: 0.8rem; margin-top: 6px; margin-left: 4px; }

    /* ── Search ─────────────────────────────── */
    .search-wrap {
      position: relative;
      margin-bottom: 20px;
    }

    .search-wrap input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 16px 10px 38px;
      font-size: 0.875rem;
      color: var(--text);
      outline: none;
      font-family: 'Inter', sans-serif;
      transition: border-color .2s;
    }

    .search-wrap input::placeholder { color: var(--muted); }
    .search-wrap input:focus { border-color: var(--accent); }

    .search-icon {
      position: absolute;
      left: 12px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 0.9rem;
      pointer-events: none;
    }

    /* ── Task list ──────────────────────────── */
    #task-list { display: flex; flex-direction: column; gap: 8px; }

    .task-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: border-color .15s, transform .15s;
      animation: slideIn .2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .task-item:hover { border-color: rgba(255,255,255,0.13); }
    .task-item.done { opacity: .45; }

    .check-btn {
      width: 20px; height: 20px;
      border-radius: 6px;
      border: 2px solid var(--muted);
      background: none;
      cursor: pointer;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s;
      color: white;
      font-size: 0.75rem;
    }

    .check-btn:hover { border-color: var(--green); }
    .check-btn.checked { background: var(--green); border-color: var(--green); }

    .task-body { flex: 1; min-width: 0; }

    .task-title {
      font-size: 0.925rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .task-item.done .task-title {
      text-decoration: line-through;
      color: var(--muted);
    }

    .task-meta {
      display: flex;
      gap: 10px;
      margin-top: 4px;
      align-items: center;
    }

    .tag {
      font-size: 0.72rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 999px;
      letter-spacing: 0.02em;
    }

    .tag-high   { background: rgba(248,113,113,.15); color: var(--red); }
    .tag-medium { background: rgba(251,191,36,.12);  color: var(--yellow); }
    .tag-low    { background: rgba(52,211,153,.12);  color: var(--green); }

    .due-tag {
      font-size: 0.72rem;
      color: var(--muted);
      display: flex; align-items: center; gap: 4px;
    }

    .delete-btn {
      background: none;
      border: 1px solid transparent;
      border-radius: 7px;
      color: var(--muted);
      cursor: pointer;
      padding: 5px 8px;
      font-size: 0.8rem;
      transition: all .15s;
      opacity: 0;
    }

    .task-item:hover .delete-btn { opacity: 1; }
    .delete-btn:hover { color: var(--red); border-color: rgba(248,113,113,.3); background: rgba(248,113,113,.08); }

    /* ── Empty state ────────────────────────── */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
    .empty p { font-size: 0.9rem; }

    /* ── Stats row ──────────────────────────── */
    .stats {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
    }

    .stat-card {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
    }

    .stat-value { font-size: 1.6rem; font-weight: 700; }
    .stat-label { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
    .stat-card.accent .stat-value { color: var(--accent); }
    .stat-card.green  .stat-value { color: var(--green); }
    .stat-card.red    .stat-value { color: var(--red); }
  </style>
</head>
<body>

<div class="layout">

  <!-- Sidebar -->
  <aside>
    <div class="logo">
      <div class="logo-icon">✦</div>
      <span class="logo-text">Tasks</span>
    </div>

    <nav>
      <button class="nav-item active" data-status="" onclick="setFilter(this, '')">
        <span class="nav-dot"></span> All tasks
        <span class="nav-count" id="nav-all">0</span>
      </button>
      <button class="nav-item" data-status="todo" onclick="setFilter(this, 'todo')">
        <span class="nav-dot"></span> To do
        <span class="nav-count" id="nav-todo">0</span>
      </button>
      <button class="nav-item" data-status="done" onclick="setFilter(this, 'done')">
        <span class="nav-dot"></span> Completed
        <span class="nav-count" id="nav-done">0</span>
      </button>
    </nav>

    <div class="sidebar-footer">
      Tasks saves automatically.<br>Refresh anytime to sync.
    </div>
  </aside>

  <!-- Main -->
  <div class="content">
    <div class="page-header">
      <div>
        <div class="page-title" id="page-title">All tasks</div>
        <div class="page-sub" id="page-sub">Everything in one place</div>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats">
      <div class="stat-card accent">
        <div class="stat-value" id="stat-total">0</div>
        <div class="stat-label">Total tasks</div>
      </div>
      <div class="stat-card green">
        <div class="stat-value" id="stat-done">0</div>
        <div class="stat-label">Completed</div>
      </div>
      <div class="stat-card red">
        <div class="stat-value" id="stat-high">0</div>
        <div class="stat-label">High priority</div>
      </div>
    </div>

    <!-- Add task -->
    <div class="add-bar">
      <input name="title" placeholder="Add a task… (press Enter)" autocomplete="off" />
      <div class="divider"></div>
      <input name="due" type="date" title="Due date" />
      <div class="divider"></div>
      <select name="priority">
        <option value="low">🟢 Low</option>
        <option value="medium" selected>🟡 Medium</option>
        <option value="high">🔴 High</option>
      </select>
      <button class="btn-add" id="add-btn">+ Add</button>
    </div>
    <div class="error-msg" id="add-error"></div>

    <!-- Search -->
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input name="search" placeholder="Search tasks…" autocomplete="off" />
    </div>

    <!-- Task list -->
    <div id="task-list"></div>
  </div>
</div>

<script>
  let currentStatus = "";
  let searchQuery = "";

  const pageLabels = {
    "": ["All tasks", "Everything in one place"],
    "todo": ["To do", "Tasks waiting to be completed"],
    "done": ["Completed", "Tasks you've finished"],
  };

  function setFilter(btn, status) {
    document.querySelectorAll(".nav-item").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentStatus = status;
    const [title, sub] = pageLabels[status];
    document.getElementById("page-title").textContent = title;
    document.getElementById("page-sub").textContent = sub;
    render();
  }

  async function fetchAll() {
    const res = await fetch("/tasks");
    return res.json();
  }

  async function fetchFiltered() {
    const params = new URLSearchParams();
    if (currentStatus) params.set("status", currentStatus);
    if (searchQuery)   params.set("q", searchQuery);
    const res = await fetch("/tasks?" + params);
    return res.json();
  }

  function escHtml(str) {
    return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  async function render() {
    const [all, filtered] = await Promise.all([fetchAll(), fetchFiltered()]);

    // Update sidebar counts
    document.getElementById("nav-all").textContent  = all.length;
    document.getElementById("nav-todo").textContent = all.filter(t => t.status === "todo").length;
    document.getElementById("nav-done").textContent = all.filter(t => t.status === "done").length;

    // Update stats
    document.getElementById("stat-total").textContent = all.length;
    document.getElementById("stat-done").textContent  = all.filter(t => t.status === "done").length;
    document.getElementById("stat-high").textContent  = all.filter(t => t.priority === "high").length;

    const list = document.getElementById("task-list");

    if (!filtered.length) {
      list.innerHTML = `
        <div class="empty">
          <div class="empty-icon">✦</div>
          <p>No tasks here yet.</p>
        </div>`;
      return;
    }

    list.innerHTML = filtered.map(t => `
      <div class="task-item ${t.status === "done" ? "done" : ""}" data-id="${t.id}">
        <button class="check-btn ${t.status === "done" ? "checked" : ""}"
                onclick="markDone(${t.id})" title="Mark complete">
          ${t.status === "done" ? "✓" : ""}
        </button>
        <div class="task-body">
          <div class="task-title">${escHtml(t.title)}</div>
          <div class="task-meta">
            <span class="tag tag-${t.priority}">${t.priority}</span>
            ${t.due_date ? `<span class="due-tag">📅 ${t.due_date}</span>` : ""}
            ${t.description ? `<span class="due-tag">${escHtml(t.description)}</span>` : ""}
          </div>
        </div>
        <button class="delete-btn" onclick="deleteTask(${t.id})" title="Delete">✕</button>
      </div>
    `).join("");
  }

  async function markDone(id) {
    await fetch(`/tasks/${id}/done`, { method: "PATCH" });
    render();
  }

  async function deleteTask(id) {
    if (!confirm("Delete this task?")) return;
    await fetch(`/tasks/${id}`, { method: "DELETE" });
    render();
  }

  document.getElementById("add-btn").addEventListener("click", async () => {
    const title    = document.querySelector("input[name=title]").value.trim();
    const due      = document.querySelector("input[name=due]").value || null;
    const priority = document.querySelector("select[name=priority]").value;
    const errEl    = document.getElementById("add-error");

    if (!title) { errEl.textContent = "Title is required."; return; }
    errEl.textContent = "";

    const res = await fetch("/tasks", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ title, due_date: due, priority }),
    });

    if (res.ok) {
      document.querySelector("input[name=title]").value = "";
      document.querySelector("input[name=due]").value = "";
      render();
    } else {
      const data = await res.json();
      errEl.textContent = data.detail || "Error adding task.";
    }
  });

  document.querySelector("input[name=title]").addEventListener("keydown", e => {
    if (e.key === "Enter") document.getElementById("add-btn").click();
  });

  let searchTimer;
  document.querySelector("input[name=search]").addEventListener("input", e => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      searchQuery = e.target.value.trim();
      render();
    }, 200);
  });

  render();
</script>
</body>
</html>
