<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f5f7;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: #1a1a2e;
      color: white;
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 { font-size: 1.4rem; font-weight: 700; }

    .badge {
      background: #4f46e5;
      color: white;
      font-size: 0.75rem;
      padding: 3px 10px;
      border-radius: 999px;
      font-weight: 600;
    }

    main {
      max-width: 820px;
      margin: 32px auto;
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* Add form */
    .card {
      background: white;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,.07);
    }

    .card h2 { font-size: 1rem; font-weight: 700; margin-bottom: 16px; color: #4f46e5; }

    .form-row { display: flex; gap: 10px; flex-wrap: wrap; }

    input, select {
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      padding: 9px 12px;
      font-size: 0.9rem;
      outline: none;
      transition: border-color .2s;
    }

    input:focus, select:focus { border-color: #4f46e5; }

    input[name="title"] { flex: 1; min-width: 180px; }
    input[name="due"]   { width: 148px; }
    select[name="priority"] { width: 120px; }

    .btn {
      padding: 9px 18px;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }

    .btn:hover { opacity: .85; }
    .btn-primary { background: #4f46e5; color: white; }
    .btn-sm      { padding: 5px 11px; font-size: 0.78rem; }
    .btn-done    { background: #22c55e; color: white; }
    .btn-delete  { background: #ef4444; color: white; }

    /* Filters */
    .filters { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

    .filter-btn {
      padding: 6px 14px;
      border: 1.5px solid #e2e8f0;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      background: white;
      transition: all .15s;
    }

    .filter-btn.active, .filter-btn:hover {
      background: #4f46e5;
      color: white;
      border-color: #4f46e5;
    }

    input[name="search"] { flex: 1; min-width: 160px; }

    /* Task list */
    #task-list { display: flex; flex-direction: column; gap: 10px; }

    .task-item {
      background: white;
      border-radius: 12px;
      padding: 14px 18px;
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
      display: flex;
      align-items: center;
      gap: 14px;
      transition: opacity .2s;
    }

    .task-item.done { opacity: .5; }

    .task-check {
      width: 20px; height: 20px;
      border-radius: 50%;
      border: 2px solid #cbd5e1;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: all .15s;
    }

    .task-check.checked { background: #22c55e; border-color: #22c55e; color: white; }

    .task-body { flex: 1; min-width: 0; }

    .task-title {
      font-weight: 600;
      font-size: 0.95rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .task-item.done .task-title { text-decoration: line-through; color: #94a3b8; }

    .task-meta { font-size: 0.78rem; color: #94a3b8; margin-top: 3px; }

    .priority-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .p-high   { background: #ef4444; }
    .p-medium { background: #f59e0b; }
    .p-low    { background: #22c55e; }

    .task-actions { display: flex; gap: 6px; }

    .empty {
      text-align: center;
      padding: 40px;
      color: #94a3b8;
      font-size: 0.9rem;
    }

    .error-msg { color: #ef4444; font-size: 0.82rem; margin-top: 8px; }
  </style>
</head>
<body>

<header>
  <h1>Task Manager</h1>
  <span class="badge" id="count-badge">0 tasks</span>
</header>

<main>

  <!-- Add task -->
  <div class="card">
    <h2>Add Task</h2>
    <div class="form-row">
      <input name="title" placeholder="Task title…" />
      <input name="due" type="date" />
      <select name="priority">
        <option value="low">Low</option>
        <option value="medium" selected>Medium</option>
        <option value="high">High</option>
      </select>
      <button class="btn btn-primary" id="add-btn">Add</button>
    </div>
    <div class="error-msg" id="add-error"></div>
  </div>

  <!-- Filters + search -->
  <div class="card" style="padding: 16px 24px;">
    <div class="filters">
      <button class="filter-btn active" data-status="">All</button>
      <button class="filter-btn" data-status="todo">To Do</button>
      <button class="filter-btn" data-status="done">Done</button>
      <input name="search" placeholder="Search…" style="margin-left:auto;" />
    </div>
  </div>

  <!-- Task list -->
  <div id="task-list"></div>

</main>

<script>
  let currentStatus = "";
  let searchQuery = "";

  async function fetchTasks() {
    const params = new URLSearchParams();
    if (currentStatus) params.set("status", currentStatus);
    if (searchQuery)   params.set("q", searchQuery);
    const res = await fetch("/tasks?" + params);
    return res.json();
  }

  function priorityClass(p) {
    return { high: "p-high", medium: "p-medium", low: "p-low" }[p] || "p-medium";
  }

  async function render() {
    const tasks = await fetchTasks();
    const list = document.getElementById("task-list");
    document.getElementById("count-badge").textContent =
      tasks.length + (tasks.length === 1 ? " task" : " tasks");

    if (!tasks.length) {
      list.innerHTML = `<div class="empty">No tasks yet — add one above!</div>`;
      return;
    }

    list.innerHTML = tasks.map(t => `
      <div class="task-item ${t.status === "done" ? "done" : ""}" data-id="${t.id}">
        <div class="task-check ${t.status === "done" ? "checked" : ""}"
             onclick="markDone(${t.id})" title="Mark done">
          ${t.status === "done" ? "✓" : ""}
        </div>
        <div class="priority-dot ${priorityClass(t.priority)}"></div>
        <div class="task-body">
          <div class="task-title">${escHtml(t.title)}</div>
          <div class="task-meta">
            ${t.priority}${t.due_date ? " · due " + t.due_date : ""}
            ${t.description ? " · " + escHtml(t.description) : ""}
          </div>
        </div>
        <div class="task-actions">
          <button class="btn btn-sm btn-delete" onclick="deleteTask(${t.id})">Delete</button>
        </div>
      </div>
    `).join("");
  }

  function escHtml(str) {
    return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  async function markDone(id) {
    await fetch(`/tasks/${id}/done`, { method: "PATCH" });
    render();
  }

  async function deleteTask(id) {
    if (!confirm("Delete this task?")) return;
    await fetch(`/tasks/${id}`, { method: "DELETE" });
    render();
  }

  document.getElementById("add-btn").addEventListener("click", async () => {
    const title    = document.querySelector("input[name=title]").value.trim();
    const due      = document.querySelector("input[name=due]").value || null;
    const priority = document.querySelector("select[name=priority]").value;
    const errEl    = document.getElementById("add-error");

    if (!title) { errEl.textContent = "Title is required."; return; }
    errEl.textContent = "";

    const res = await fetch("/tasks", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ title, due_date: due, priority }),
    });

    if (res.ok) {
      document.querySelector("input[name=title]").value = "";
      document.querySelector("input[name=due]").value = "";
      render();
    } else {
      const data = await res.json();
      errEl.textContent = data.detail || "Error adding task.";
    }
  });

  // Enter key on title input
  document.querySelector("input[name=title]").addEventListener("keydown", e => {
    if (e.key === "Enter") document.getElementById("add-btn").click();
  });

  // Filter buttons
  document.querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      currentStatus = btn.dataset.status;
      render();
    });
  });

  // Search
  let searchTimer;
  document.querySelector("input[name=search]").addEventListener("input", e => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      searchQuery = e.target.value.trim();
      render();
    }, 250);
  });

  render();
</script>
</body>
</html>
