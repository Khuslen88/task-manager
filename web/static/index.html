<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tasks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #f5f0eb;
      --white:    #ffffff;
      --dark:     #1a1a1a;
      --muted:    #9a9a9a;
      --border:   #ede8e2;
      --pink:     #e8697d;
      --orange:   #f5a623;
      --mint:     #d4edda;
      --mint-dark:#3a7d52;
      --purple:   #7c6fef;
      --radius:   16px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--dark);
      min-height: 100vh;
      display: flex;
    }

    /* ── Icon rail ──────────────────────────── */
    .icon-rail {
      width: 64px;
      background: var(--dark);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 0;
      gap: 8px;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 10;
    }

    .rail-logo {
      width: 36px; height: 36px;
      background: white;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
      margin-bottom: 16px;
    }

    .rail-btn {
      width: 40px; height: 40px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: #666;
      font-size: 1.1rem;
      transition: background .15s, color .15s;
    }

    .rail-btn:hover, .rail-btn.active { background: rgba(255,255,255,.1); color: white; }
    .rail-help { margin-top: auto; }

    /* ── Left sidebar ───────────────────────── */
    .sidebar {
      width: 220px;
      background: var(--white);
      border-right: 1px solid var(--border);
      position: fixed;
      top: 0; left: 64px; bottom: 0;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      overflow-y: auto;
    }

    .sidebar-title {
      font-size: 1rem;
      font-weight: 700;
      padding-left: 4px;
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg);
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 0.82rem;
      color: var(--muted);
    }

    .nav-section { display: flex; flex-direction: column; gap: 2px; }
    .nav-label { font-size: 0.75rem; font-weight: 600; color: var(--muted); padding: 0 8px; margin-bottom: 4px; letter-spacing: .04em; text-transform: uppercase; }

    .nav-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      color: #555;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      transition: all .15s;
    }

    .nav-item:hover { background: var(--bg); color: var(--dark); }
    .nav-item.active { background: var(--dark); color: white; }
    .nav-item.active .nav-count { background: rgba(255,255,255,.2); color: white; }

    .nav-count {
      background: var(--bg);
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 600;
      padding: 2px 8px;
      color: var(--muted);
    }

    .add-link {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.82rem;
      color: var(--muted);
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 8px;
      transition: color .15s;
      border: none;
      background: none;
    }

    .add-link:hover { color: var(--dark); }

    /* ── Main ───────────────────────────────── */
    .main {
      margin-left: 284px;
      flex: 1;
      padding: 32px 36px;
      min-height: 100vh;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    .today { font-size: 0.9rem; color: var(--muted); font-weight: 500; }

    .avatar {
      width: 36px; height: 36px;
      background: var(--pink);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 0.85rem;
    }

    /* ── Welcome banner ─────────────────────── */
    .banner {
      background: var(--mint);
      border-radius: var(--radius);
      padding: 28px 32px;
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      overflow: hidden;
      position: relative;
    }

    .banner-text p { font-size: 0.9rem; color: var(--mint-dark); margin-bottom: 6px; }
    .banner-text h2 { font-size: 1.7rem; font-weight: 800; color: var(--dark); line-height: 1.1; }

    .banner-btn {
      margin-top: 18px;
      background: var(--dark);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 10px 22px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: opacity .15s;
    }

    .banner-btn:hover { opacity: .85; }

    .banner-art {
      font-size: 4rem;
      opacity: .35;
      position: absolute;
      right: 32px;
      top: 50%;
      transform: translateY(-50%);
    }

    /* ── Stats row ──────────────────────────── */
    .stats {
      display: flex;
      gap: 16px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }

    .stat {
      flex: 1;
      min-width: 120px;
    }

    .stat-label { font-size: 0.78rem; color: var(--muted); font-weight: 500; margin-bottom: 4px; }
    .stat-value { font-size: 1.5rem; font-weight: 800; }

    /* ── Two-column grid ────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1.1fr;
      gap: 24px;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .section-title { font-size: 1rem; font-weight: 700; }
    .view-all { font-size: 0.8rem; color: var(--muted); cursor: pointer; border: none; background: none; font-family: 'Inter', sans-serif; }
    .view-all:hover { color: var(--dark); }

    /* ── Priority cards ─────────────────────── */
    .priority-cards { display: flex; flex-direction: column; gap: 12px; }

    .p-card {
      border-radius: var(--radius);
      padding: 20px;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      transition: transform .15s;
    }

    .p-card:hover { transform: translateY(-2px); }
    .p-card.high   { background: linear-gradient(135deg, #e8697d, #d94f65); color: white; }
    .p-card.medium { background: linear-gradient(135deg, #f5a623, #e8940e); color: white; }
    .p-card.low    { background: linear-gradient(135deg, #6bcc8f, #4ab870); color: white; }

    .p-card-label { font-size: 0.75rem; font-weight: 600; opacity: .8; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .06em; }
    .p-card-count { font-size: 2rem; font-weight: 800; }
    .p-card-sub   { font-size: 0.78rem; opacity: .75; margin-top: 2px; }

    .p-card-icon {
      position: absolute;
      right: 16px; top: 50%;
      transform: translateY(-50%);
      font-size: 2.2rem;
      opacity: .25;
    }

    /* ── Task list panel ────────────────────── */
    .task-panel {
      background: var(--white);
      border-radius: var(--radius);
      padding: 20px;
    }

    /* Add task inline */
    .inline-add {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .inline-add input[name="title"] {
      flex: 1;
      min-width: 140px;
      border: 1.5px solid var(--border);
      border-radius: 9px;
      padding: 8px 12px;
      font-size: 0.85rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color .2s;
    }

    .inline-add input[name="title"]:focus { border-color: var(--purple); }

    .inline-add select,
    .inline-add input[type="date"] {
      border: 1.5px solid var(--border);
      border-radius: 9px;
      padding: 8px 10px;
      font-size: 0.8rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      background: white;
      cursor: pointer;
    }

    .add-task-btn {
      background: var(--dark);
      color: white;
      border: none;
      border-radius: 9px;
      padding: 8px 16px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      white-space: nowrap;
      transition: opacity .15s;
    }

    .add-task-btn:hover { opacity: .8; }
    .error-msg { color: var(--pink); font-size: 0.78rem; margin-bottom: 10px; }

    /* Task rows */
    .task-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 0;
      border-bottom: 1px solid var(--border);
      transition: opacity .2s;
      animation: fadeIn .2s ease;
    }

    @keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }

    .task-row:last-child { border-bottom: none; }
    .task-row.done { opacity: .4; }

    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-high   { background: var(--pink); }
    .dot-medium { background: var(--orange); }
    .dot-low    { background: #6bcc8f; }

    .task-row-body { flex: 1; min-width: 0; }

    .task-row-title {
      font-size: 0.875rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .task-row.done .task-row-title { text-decoration: line-through; color: var(--muted); }

    .task-row-meta { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }

    .status-badge {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 999px;
      white-space: nowrap;
    }

    .badge-todo { background: #f0edff; color: var(--purple); }
    .badge-done { background: #e6f9ef; color: var(--mint-dark); }

    .row-check {
      width: 18px; height: 18px;
      border-radius: 5px;
      border: 2px solid var(--border);
      background: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem;
      transition: all .15s;
      flex-shrink: 0;
    }

    .row-check:hover { border-color: #6bcc8f; }
    .row-check.checked { background: #6bcc8f; border-color: #6bcc8f; color: white; }

    .row-delete {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.75rem;
      padding: 4px 6px;
      border-radius: 6px;
      opacity: 0;
      transition: all .15s;
    }

    .task-row:hover .row-delete { opacity: 1; }
    .row-delete:hover { color: var(--pink); background: rgba(232,105,125,.08); }

    .empty-tasks {
      text-align: center;
      padding: 32px 0;
      color: var(--muted);
      font-size: 0.85rem;
    }

    .add-new-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding-top: 14px;
      color: var(--muted);
      font-size: 0.82rem;
      cursor: pointer;
      border: 1.5px dashed var(--border);
      border-radius: 10px;
      padding: 12px;
      margin-top: 12px;
      justify-content: center;
      transition: border-color .15s, color .15s;
    }

    .add-new-row:hover { border-color: var(--purple); color: var(--purple); }
  </style>
</head>
<body>

<!-- Icon rail -->
<div class="icon-rail">
  <div class="rail-logo">✦</div>
  <div class="rail-btn active">🏠</div>
  <div class="rail-btn">📁</div>
  <div class="rail-btn">📅</div>
  <div class="rail-btn">👤</div>
  <div class="rail-btn rail-help">❓</div>
</div>

<!-- Sidebar -->
<div class="sidebar">
  <div class="sidebar-title">Space</div>

  <div class="search-box">🔍 <span id="search-placeholder">Search for...</span>
    <input id="search-input" style="border:none;background:none;outline:none;font-size:0.82rem;font-family:'Inter',sans-serif;width:100%;color:#333;" placeholder="Search..." />
  </div>

  <div class="nav-section">
    <div class="nav-label">Tasks</div>
    <button class="nav-item active" onclick="setFilter(this,'')" data-status="">
      All <span class="nav-count" id="nav-all">0</span>
    </button>
    <button class="nav-item" onclick="setFilter(this,'todo')" data-status="todo">
      In progress <span class="nav-count" id="nav-todo">0</span>
    </button>
    <button class="nav-item" onclick="setFilter(this,'done')" data-status="done">
      Done <span class="nav-count" id="nav-done">0</span>
    </button>
    <button class="add-link" onclick="focusAdd()">⊕ Add a new task</button>
  </div>
</div>

<!-- Main -->
<div class="main">
  <div class="top-bar">
    <div class="today" id="today-label">Today</div>
    <div class="avatar">Me</div>
  </div>

  <!-- Banner -->
  <div class="banner">
    <div class="banner-text">
      <p>Welcome back to your</p>
      <h2>Daily task manager</h2>
      <button class="banner-btn" onclick="focusAdd()">Start tracking</button>
    </div>
    <div class="banner-art">📋</div>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat">
      <div class="stat-label">Total tasks</div>
      <div class="stat-value" id="stat-total">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">In progress</div>
      <div class="stat-value" id="stat-todo">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Finished tasks</div>
      <div class="stat-value" id="stat-done">0</div>
    </div>
  </div>

  <!-- Grid -->
  <div class="grid">

    <!-- Priority cards -->
    <div>
      <div class="section-header">
        <div class="section-title">By priority</div>
      </div>
      <div class="priority-cards">
        <div class="p-card high" onclick="setFilterByPriority('high')">
          <div class="p-card-label">High priority</div>
          <div class="p-card-count" id="card-high">0</div>
          <div class="p-card-sub">tasks need attention</div>
          <div class="p-card-icon">🔥</div>
        </div>
        <div class="p-card medium" onclick="setFilterByPriority('medium')">
          <div class="p-card-label">Medium priority</div>
          <div class="p-card-count" id="card-medium">0</div>
          <div class="p-card-sub">tasks in queue</div>
          <div class="p-card-icon">⚡</div>
        </div>
        <div class="p-card low" onclick="setFilterByPriority('low')">
          <div class="p-card-label">Low priority</div>
          <div class="p-card-count" id="card-low">0</div>
          <div class="p-card-sub">tasks when you can</div>
          <div class="p-card-icon">🌿</div>
        </div>
      </div>
    </div>

    <!-- Daily tasks -->
    <div class="task-panel">
      <div class="section-header">
        <div class="section-title" id="panel-title">Daily tasks</div>
      </div>

      <!-- Add form -->
      <div class="inline-add">
        <input name="title" id="task-title-input" placeholder="New task title…" autocomplete="off" />
        <input type="date" name="due" id="task-due-input" />
        <select name="priority" id="task-priority-input">
          <option value="low">🟢 Low</option>
          <option value="medium" selected>🟡 Medium</option>
          <option value="high">🔴 High</option>
        </select>
        <button class="add-task-btn" id="add-btn">+ Add</button>
      </div>
      <div class="error-msg" id="add-error"></div>

      <!-- Task list -->
      <div id="task-list"></div>

      <div class="add-new-row" onclick="focusAdd()">⊕ Add a new task</div>
    </div>

  </div>
</div>

<script>
  let currentStatus = "";
  let currentPriority = "";
  let searchQuery = "";

  // Set today's date
  const now = new Date();
  document.getElementById("today-label").textContent =
    now.toLocaleDateString("en-US", { weekday:"long", month:"long", day:"numeric" });

  function focusAdd() {
    document.getElementById("task-title-input").focus();
  }

  function setFilter(btn, status) {
    document.querySelectorAll(".nav-item").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentStatus = status;
    currentPriority = "";
    const labels = { "": "Daily tasks", "todo": "In progress", "done": "Completed" };
    document.getElementById("panel-title").textContent = labels[status] || "Daily tasks";
    render();
  }

  function setFilterByPriority(priority) {
    currentPriority = currentPriority === priority ? "" : priority;
    currentStatus = "";
    document.querySelectorAll(".nav-item").forEach(b => b.classList.remove("active"));
    document.querySelector(".nav-item[data-status='']").classList.add("active");
    document.getElementById("panel-title").textContent =
      currentPriority ? currentPriority.charAt(0).toUpperCase() + currentPriority.slice(1) + " priority" : "Daily tasks";
    render();
  }

  async function fetchAll() {
    const res = await fetch("/tasks");
    return res.json();
  }

  async function fetchFiltered() {
    const params = new URLSearchParams();
    if (currentStatus)   params.set("status", currentStatus);
    if (currentPriority) params.set("priority", currentPriority);
    if (searchQuery)     params.set("q", searchQuery);
    const res = await fetch("/tasks?" + params);
    return res.json();
  }

  function esc(str) {
    return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  async function render() {
    const [all, filtered] = await Promise.all([fetchAll(), fetchFiltered()]);

    const todo = all.filter(t => t.status === "todo");
    const done = all.filter(t => t.status === "done");

    // Sidebar counts
    document.getElementById("nav-all").textContent  = all.length;
    document.getElementById("nav-todo").textContent = todo.length;
    document.getElementById("nav-done").textContent = done.length;

    // Stats
    document.getElementById("stat-total").textContent = all.length;
    document.getElementById("stat-todo").textContent  = todo.length;
    document.getElementById("stat-done").textContent  = done.length;

    // Priority cards
    document.getElementById("card-high").textContent   = all.filter(t => t.priority==="high").length;
    document.getElementById("card-medium").textContent = all.filter(t => t.priority==="medium").length;
    document.getElementById("card-low").textContent    = all.filter(t => t.priority==="low").length;

    // Task list
    const list = document.getElementById("task-list");
    if (!filtered.length) {
      list.innerHTML = `<div class="empty-tasks">No tasks here yet.</div>`;
      return;
    }

    list.innerHTML = filtered.map(t => `
      <div class="task-row ${t.status==="done"?"done":""}" data-id="${t.id}">
        <div class="status-dot dot-${t.priority}"></div>
        <div class="task-row-body">
          <div class="task-row-title">${esc(t.title)}</div>
          <div class="task-row-meta">${t.due_date ? "📅 "+t.due_date : "No due date"}</div>
        </div>
        <span class="status-badge ${t.status==="done"?"badge-done":"badge-todo"}">
          ${t.status==="done" ? "Done" : "In progress"}
        </span>
        <button class="row-check ${t.status==="done"?"checked":""}" onclick="markDone(${t.id})" title="Complete">
          ${t.status==="done"?"✓":""}
        </button>
        <button class="row-delete" onclick="deleteTask(${t.id})" title="Delete">✕</button>
      </div>
    `).join("");
  }

  async function markDone(id) {
    await fetch(`/tasks/${id}/done`, { method:"PATCH" });
    render();
  }

  async function deleteTask(id) {
    if (!confirm("Delete this task?")) return;
    await fetch(`/tasks/${id}`, { method:"DELETE" });
    render();
  }

  document.getElementById("add-btn").addEventListener("click", async () => {
    const title    = document.getElementById("task-title-input").value.trim();
    const due      = document.getElementById("task-due-input").value || null;
    const priority = document.getElementById("task-priority-input").value;
    const errEl    = document.getElementById("add-error");

    if (!title) { errEl.textContent = "Title is required."; return; }
    errEl.textContent = "";

    const res = await fetch("/tasks", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ title, due_date: due, priority }),
    });

    if (res.ok) {
      document.getElementById("task-title-input").value = "";
      document.getElementById("task-due-input").value = "";
      render();
    } else {
      const data = await res.json();
      errEl.textContent = data.detail || "Error adding task.";
    }
  });

  document.getElementById("task-title-input").addEventListener("keydown", e => {
    if (e.key === "Enter") document.getElementById("add-btn").click();
  });

  // Search
  let searchTimer;
  document.getElementById("search-input").addEventListener("input", e => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      searchQuery = e.target.value.trim();
      render();
    }, 200);
  });

  render();
</script>
</body>
</html>
